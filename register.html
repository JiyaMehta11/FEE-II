<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Gameverse</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .background-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            animation: background-move 30s linear infinite;
        }

        .register-container {
            max-width: 400px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.8); /* Semi-transparent dark background */
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5); /* Darker shadow for contrast */
            text-align: center;
            z-index: 1;
        }

        .register-container h2 {
            color: #ff4081; /* Vibrant color for heading */
            margin-bottom: 20px;
        }

        .register-container form {
            display: flex;
            flex-direction: column;
        }

        .register-container input[type="text"],
        .register-container input[type="email"],
        .register-container input[type="password"] {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background-color: #1f1f1f; /* Dark background for input fields */
            color: #fff;
        }

        .register-container input[type="submit"] {
            padding: 10px;
            margin-top: 20px;
            background-color: #ff4081; /* Vibrant color for submit button */
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .register-container input[type="submit"]:hover {
            background-color: #e91e63; /* Darker shade on hover */
        }

        .register-container p {
            margin-top: 20px;
            color: #ccc; /* Light text color for links */
        }

        .register-container a {
            color: #ff4081; /* Vibrant color for links */
        }

        .register-container a:hover {
            color: #e91e63; /* Darker shade on hover */
        }

        @keyframes background-move {
            0% { transform: scale(1) translateX(0); }
            50% { transform: scale(1.1) translateX(-10%); }
            100% { transform: scale(1) translateX(0); }
        }
    </style>
</head>
<body>
    <video class="background-video" autoplay muted loop>
        <source src="https://www.example.com/path-to-your-gaming-background-video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="register-container">
        <h2>Register for Gameverse</h2>
        <form action="#" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="submit" value="Register">
        </form>
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
</body>
</html>
