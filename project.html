<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameverse</title>
    <style>
        /* Global Styles */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0f0f0f; /* Dark background for better contrast */
            color: #fafafa; /* Light text color for readability */
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            color: #ff4081; /* Vibrant color for links */
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #e91e63; /* Slightly darker shade on hover */
        }

        h1, h2, h3 {
            margin: 0;
            padding: 0;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #333, #555);
            padding: 20px;
            text-align: center;
            position: relative;
        }

        header h1 {
            color: #ff4081; /* Vibrant color for the logo */
            font-size: 3rem;
            letter-spacing: 2px;
        }

        header nav {
            margin-top: 10px;
        }

        header nav a {
            margin: 0 20px;
            font-size: 1.2rem;
            color: #fafafa; /* Light text color for nav links */
        }

        /* Hero Section */
        .hero {
            background: url('https://images.unsplash.com/photo-1561484930-9c0b502c0765') no-repeat center center/cover;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.7); /* Darker shadow for better contrast */
        }

        .hero h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: fadeIn 2s ease-in-out;
        }

        .hero p {
            font-size: 1.2rem;
            animation: fadeIn 3s ease-in-out;
        }

        /* Keyframes for Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Game Gallery */
        .gallery {
            padding: 40px 20px;
            background-color: #1e1e1e; /* Dark background for gallery */
        }

        .gallery h2 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 30px;
            color: #ff4081; /* Vibrant color for gallery title */
        }

        .gallery .games {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .gallery .game-card {
            background-color: #2e2e2e; /* Dark card background */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5); /* Darker shadow for better contrast */
            width: 250px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
            overflow: hidden;
        }

        .gallery .game-card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .gallery .game-card h3 {
            margin-top: 0;
            color: #ff4081; /* Vibrant color for game titles */
            font-size: 1.7rem;
        }

        .gallery .game-card p {
            margin: 10px 0;
            color: #ccc; /* Light text color for descriptions */
        }

        .gallery .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6); /* Darker shadow on hover */
        }

        /* Footer */
        footer {
            background-color: #1e1e1e;
            padding: 20px;
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
        }

        footer a {
            color: #ff4081; /* Vibrant color for footer links */
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5rem;
            }

            .hero h2 {
                font-size: 2.5rem;
            }

            .gallery .game-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Gameverse</h1>
        <nav>
            <a href="/">Home</a>
            <a href="games.html">Games</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div>
            <h2>Discover Amazing Games</h2>
            <p>Explore the latest and greatest games from around the world.</p>
        </div>
    </section>

    <!-- Game Gallery -->
    <section class="gallery" id="games">
        <h2>Featured Games</h2>
        <div class="games" id="games-list"></div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Gameverse. All rights reserved. | <a href="/privacy">Privacy Policy</a></p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const games = [
                {
                    name: "Cyberpunk 2077",
                    description: "A futuristic action RPG.",
                    image: "https://placehold.co/250x150/cyberpunk"
                },
                {
                    name: "The Legend of Zelda: Breath of the Wild",
                    description: "An open-world adventure game.",
                    image: "https://placehold.co/250x150/zelda"
                },
                {
                    name: "Apex Legends",
                    description: "A free-to-play battle royale game.",
                    image: "https://placehold.co/250x150/apex"
                }
            ];

            const gamesList = document.getElementById('games-list');
            games.forEach(game => {
                const gameCard = document.createElement('div');
                gameCard.classList.add('game-card');
                gameCard.innerHTML = `
                    <img src="${game.image}" alt="${game.name}">
                    <h3>${game.name}</h3>
                    <p>${game.description}</p>
                `;
                gamesList.appendChild(gameCard);
            });
        });
    </script>
</body>
</html>
